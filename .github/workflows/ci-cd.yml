name: CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ci:
    name: Build and verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npm run prisma:generate

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Trust server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare remote directories
        run: |
          ssh -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "
            mkdir -p '${{ secrets.FRONTEND_DEPLOY_PATH }}'
            mkdir -p '${{ secrets.BACKEND_DEPLOY_PATH }}'
            mkdir -p '${{ secrets.BACKEND_UPLOADS_PATH }}'
          "

      - name: Deploy frontend files
        run: |
          rsync -az --delete -e "ssh -p ${{ secrets.SERVER_PORT }}" \
            frontend/dist/frontend/browser/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.FRONTEND_DEPLOY_PATH }}/"

      - name: Upload backend source
        run: |
          rsync -az --delete -e "ssh -p ${{ secrets.SERVER_PORT }}" \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude ".env" \
            backend/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.BACKEND_DEPLOY_PATH }}/"

      - name: Configure backend and restart process
        run: |
          ssh -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "
            set -e
            cd '${{ secrets.BACKEND_DEPLOY_PATH }}'
            printf '%s\n' \
              'PORT=${{ secrets.BACKEND_PORT }}' \
              'DATABASE_URL=${{ secrets.DATABASE_URL }}' \
              'JWT_SECRET=${{ secrets.JWT_SECRET }}' \
              'CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}' \
              > .env
            npm ci
            npm run prisma:generate
            npm run build
            npx prisma migrate deploy
            if pm2 describe '${{ secrets.PM2_APP_NAME }}' > /dev/null; then
              pm2 restart '${{ secrets.PM2_APP_NAME }}'
            else
              pm2 start npm --name '${{ secrets.PM2_APP_NAME }}' -- start
            fi
            pm2 save
          "
