<main class="shell">
  <header class="topbar" [class.topbar-logged-out]="!store.token()">
    <a class="brand" routerLink="/" aria-label="Go to ExpenseFlow home" (click)="closeMobileMenu()">
      <img class="brand-logo" src="/transparent-logo.svg" alt="ExpenseFlow logo" />
    </a>

    @if (store.token()) {
      <button
        type="button"
        class="mobile-menu-button"
        [attr.aria-expanded]="mobileMenuOpen()"
        aria-label="Toggle navigation menu"
        (click)="toggleMobileMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="topbar-menu-shell" [class.mobile-open]="mobileMenuOpen()">
        <nav class="topnav" aria-label="Primary">
          <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMobileMenu()">Dashboard</a>
          <a routerLink="/expenses" routerLinkActive="active-link" (click)="closeMobileMenu()">Expenses</a>
          <a routerLink="/receipts" routerLinkActive="active-link" (click)="closeMobileMenu()">Receipts</a>
          <a routerLink="/profile" routerLinkActive="active-link" (click)="closeMobileMenu()">Profile</a>
        </nav>

        <div class="topbar-actions">
          <div class="profile-chip">
            <div class="profile-avatar">
              {{ store.userName().slice(0, 1) || 'U' }}
            </div>
            <div class="profile-copy">
              <strong>{{ store.userName() }}</strong>
              <span>{{ store.currentUser()?.email }}</span>
            </div>
          </div>

          <button type="button" class="secondary-button" (click)="logout()">Logout</button>
        </div>
      </div>
    } @else {
      <div class="logged-out-actions logged-out-actions-inline">
        <a
          class="topbar-auth-button topbar-auth-button-secondary"
          [class.topbar-auth-button-active]="authMode() === 'login'"
          routerLink="/"
          fragment="auth-access"
          [queryParams]="{ auth: 'login' }">
          Login
        </a>
        <a
          class="topbar-auth-button topbar-auth-button-primary"
          [class.topbar-auth-button-active]="authMode() === 'register'"
          routerLink="/"
          fragment="auth-access"
          [queryParams]="{ auth: 'register' }">
          Register
        </a>
      </div>
    }
  </header>

  <router-outlet />
</main>
