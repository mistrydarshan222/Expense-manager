<main class="shell">
  <header class="topbar">
    <div class="brand">
      <img class="brand-logo" src="/transparent-logo.svg" alt="ExpenseFlow logo" />
    </div>

    <nav class="topnav" aria-label="Primary">
      <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
      <a routerLink="/expenses" routerLinkActive="active-link">Expenses</a>
      <a routerLink="/receipts" routerLinkActive="active-link">Receipts</a>
      <a routerLink="/profile" routerLinkActive="active-link">Profile</a>
    </nav>

    <div class="topbar-actions">
      <div class="profile-chip">
        <div class="profile-avatar">
          {{ store.token() ? (store.userName().slice(0, 1) || 'U') : 'G' }}
        </div>
        <div class="profile-copy">
          <strong>{{ store.userName() }}</strong>
          <span>{{ store.token() ? store.currentUser()?.email : 'Not signed in' }}</span>
        </div>
      </div>

      @if (store.token()) {
        <button type="button" class="secondary-button" (click)="store.logout()">Logout</button>
      }
    </div>
  </header>

  <router-outlet />
</main>
